name: Refresh WASI Country Macros

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch World Bank data
        run: node scripts/fetch-world-bank.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name "WASI Data Bot"
          git config user.email "data-bot@wasi-platform.io"
          git add data/country-macros.json
          if git diff --cached --quiet; then
            echo "No changes to commit — data is up to date."
          else
            git commit -m "data: auto-refresh country macros $(date -u +%Y-%m-%d)"
            git push
            echo "Data updated and pushed."
          fi
